<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LingoQuest</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo">🎮 LingoQuest</div>
    <p class="tagline">Game Localization Platform</p>
    <nav>
      <button onclick="showSection('search')">Search</button>
      <button onclick="showSection('translate')">Submit Translation</button>
      <a href="login.html"><button class="outline">Login</button></a>
      <a href="admin.html"><button class="outline">Admin Panel</button></a>
    </nav>
  </header>

  <main>

    <!-- Search Section -->
    <section id="search" class="section active">
      <h2>Search Strings</h2>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by key or text...">
        <button onclick="handleSearch()">Search</button>
        <button id="sortBtn" onclick="toggleSort()">↓ Newest First</button>
      </div>
      <div id="searchResults"></div>
    </section>

    <!-- Submit Translation Section -->
    <section id="translate" class="section">
      <h2>Submit a Translation</h2>
      <div class="form-box">
        <label>Select String</label>
        <select id="stringSelect"></select>

        <label>Target Language</label>
        <select id="langCode">
          <option value="tr">Turkish</option>
          <option value="de">German</option>
          <option value="fr">French</option>
          <option value="es">Spanish</option>
          <option value="it">Italian</option>
          <option value="ja">Japanese</option>
        </select>

        <label>Translation</label>
        <textarea id="translatedText" placeholder="Enter your translation here..."></textarea>

        <button onclick="handleSubmitTranslation()">Submit Translation</button>
        <p id="translateMsg"></p>
      </div>
    </section>

  </main>

  <script>
    const API = 'http://localhost:3000/api';
  </script>
  <script src="js/dashboard.js"></script>
</body>
</html>
